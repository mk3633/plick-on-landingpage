<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLICKON | 랜딩페이지 샘플 이동 포털</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/static/pretendard.css" />
  <style>
    :root {
      --bg-black: #0b0b0e;
      --text-primary: #f5f5f7;
      --text-secondary: #a1a1a6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-black);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 900px;
      width: 100%;
      text-align: center;
    }

    .title {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-secondary);
      margin-bottom: 56px;
    }

    /* 대형 샘플 이동 버튼 영역 */
    .button-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      width: 100%;
    }

    @media (max-width: 768px) {
      .button-grid {
        grid-template-columns: 1fr;
      }
    }

    .btn-large {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 48px 24px;
      border-radius: 24px;
      text-decoration: none;
      font-size: 32px;
      font-weight: 800;
      transition: all 0.25s ease;
      border: 2px solid rgba(255, 255, 255, 0.12);
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.4);
    }

    .btn-subtext {
      font-size: 14px;
      font-weight: 500;
      opacity: 0.8;
      letter-spacing: 0.04em;
    }

    /* 샘플1 버튼 */
    .btn-sample-1 {
      background: linear-gradient(135deg, #6c5ce7 0%, #4a38be 100%);
      color: #ffffff;
    }
    .btn-sample-1:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 45px rgba(108, 92, 231, 0.45);
      border-color: rgba(255, 255, 255, 0.35);
    }

    /* 샘플2 버튼 */
    .btn-sample-2 {
      background: linear-gradient(135deg, #c4935a 0%, #946833 100%);
      color: #ffffff;
    }
    .btn-sample-2:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 45px rgba(196, 147, 90, 0.45);
      border-color: rgba(255, 255, 255, 0.35);
    }

    /* 샘플3 버튼 */
    .btn-sample-3 {
      background: linear-gradient(135deg, #22a6b3 0%, #0c737f 100%);
      color: #ffffff;
    }
    .btn-sample-3:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 45px rgba(34, 166, 179, 0.45);
      border-color: rgba(255, 255, 255, 0.35);
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">PLICKON 랜딩페이지 샘플</h1>
    <p class="subtitle">확인할 샘플 버튼을 클릭하면 해당 폴더의 페이지로 이동합니다.</p>

    <!-- 큼직한 이동 버튼 3개 -->
    <div class="button-grid">
      <a href="./A/main.html" class="btn-large btn-sample-1">
        <span>샘플1</span>
        <span class="btn-subtext">Folder A (/A/main.html)</span>
      </a>
      <a href="./B/main.html" class="btn-large btn-sample-2">
        <span>샘플2</span>
        <span class="btn-subtext">Folder B (/B/main.html)</span>
      </a>
      <a href="./C/main.html" class="btn-large btn-sample-3">
        <span>샘플3</span>
        <span class="btn-subtext">Folder C (/C/main.html)</span>
      </a>
    </div>
  </div>

       ========================================================= -->

</html>
